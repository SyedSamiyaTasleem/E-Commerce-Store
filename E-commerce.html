<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>E-Commerce Product Page</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#f4f4f4;
    }

    header{
      background:#222;
      color:white;
      padding:15px;
      text-align:center;
    }

    .container{
      width:90%;
      margin:30px auto;
      display:flex;
      gap:30px;
      background:white;
      padding:20px;
      border-radius:10px;
      box-shadow:0 0 10px rgba(0,0,0,0.1);
    }

    .product-image img{
      width:350px;
      border-radius:10px;
    }

    .product-details{
      flex:1;
    }

    .product-details h2{
      margin-bottom:15px;
      color:#333;
    }

    .price{
      color:green;
      font-size:28px;
      margin-bottom:15px;
    }

    .description{
      color:#555;
      line-height:1.6;
      margin-bottom:20px;
    }

    .btn{
      padding:12px 25px;
      border:none;
      background:#ff6600;
      color:white;
      font-size:16px;
      border-radius:5px;
      cursor:pointer;
      transition:0.3s;
    }

    .btn:hover{
      background:#e65c00;
    }

    .features{
      margin-top:20px;
    }

    .features li{
      margin-bottom:10px;
      color:#444;
    }

    @media(max-width:768px){
      .container{
        flex-direction:column;
        align-items:center;
      }

      .product-image img{
        width:100%;
      }
    }
  </style>
</head>

<body>

  <header>
    <h1>My E-Commerce Store</h1>
  </header>

  <div class="container">

    <div class="product-image">
      <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff" alt="Shoes">
    </div>

    <div class="product-details">
      <h2>Running Shoes</h2>

      <p class="price">₹1999</p>

      <p class="description">
        Comfortable and stylish running shoes for daily wear and sports activities.
        Made with high-quality material and durable sole.
      </p>

      <button class="btn">Add to Cart</button>

      <div class="features">
        <h3>Features:</h3>
        <ul>
          <li>Lightweight design</li>
          <li>Comfortable fit</li>
          <li>Breathable material</li>
          <li>Durable rubber sole</li>
        </ul>
      </div>
    </div>

  </div>

</body>
</html>
